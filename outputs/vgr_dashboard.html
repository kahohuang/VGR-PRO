<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VGR PRO 达人跟进台</title>
  <style>
    :root {
      --ink: #17211b;
      --muted: #667069;
      --line: #d9e0d8;
      --panel: #f8faf6;
      --paper: #ffffff;
      --accent: #0d6b57;
      --accent-2: #b54d27;
      --warn: #b42318;
      --soft: #eef3ec;
      --shadow: 0 16px 40px rgba(23, 33, 27, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(13, 107, 87, 0.10), transparent 36%),
        linear-gradient(315deg, rgba(181, 77, 39, 0.10), transparent 30%),
        #f3f6f0;
      font-family: "Aptos", "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 390px;
      gap: 18px;
      padding: 20px;
    }
    .sidebar, .detail, .main {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .sidebar, .detail {
      border-radius: 8px;
      padding: 18px;
      height: calc(100vh - 40px);
      position: sticky;
      top: 20px;
      overflow: auto;
    }
    .main {
      border-radius: 8px;
      padding: 18px;
      min-width: 0;
    }
    .list-head {
      position: sticky;
      top: 20px;
      z-index: 5;
      margin: -18px -18px 10px;
      padding: 18px 18px 10px;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .brand {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: 0;
    }
    .date { color: var(--muted); font-size: 12px; margin-top: 6px; }
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 18px 0;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 12px;
    }
    .stat b { display: block; font-size: 24px; }
    .stat span { color: var(--muted); font-size: 12px; }
    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin: 14px 0 7px;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px 11px;
      background: var(--paper);
      color: var(--ink);
      outline: none;
      font: inherit;
    }
    textarea {
      min-height: 82px;
      resize: vertical;
      line-height: 1.45;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(13,107,87,.12); }
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    button, .action-button {
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      border-radius: 7px;
      padding: 9px 11px;
      font: inherit;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    button.active, button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    button.danger {
      border-color: #f2c9c3;
      background: #fff3f0;
      color: var(--warn);
    }
    .count { color: var(--muted); font-size: 13px; }
    .pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin: 12px 0 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .pager-left, .pager-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pager select {
      width: auto;
      min-width: 88px;
      padding: 8px 10px;
    }
    .pager button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }
    .creator-list {
      display: grid;
      gap: 10px;
    }
    .creator-header {
      display: grid;
      grid-template-columns: 92px minmax(135px, 1fr) 130px 90px 74px 110px 120px 120px;
      gap: 12px;
      padding: 0 14px 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      border-bottom: 1px solid var(--line);
      margin-bottom: 10px;
    }
    .creator {
      border: 1px solid var(--line);
      background: var(--paper);
      border-radius: 8px;
      padding: 14px;
      cursor: pointer;
      display: grid;
      grid-template-columns: 92px minmax(135px, 1fr) 130px 90px 74px 110px 120px 120px;
      gap: 12px;
      align-items: center;
    }
    .creator:hover, .creator.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(13,107,87,.10);
    }
    .name { font-weight: 700; overflow-wrap: anywhere; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 5px; }
    .contact {
      margin-top: 6px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .contact-cell {
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .date-cell {
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
    }
    .empty-contact {
      color: var(--muted);
      font-weight: 400;
    }
    .profile-link {
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }
    .profile-link:hover { text-decoration: underline; }
    .badge-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .badge {
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
    }
    .badge.high { background: #ffe6df; color: var(--warn); }
    .badge.mid { background: #fff3d5; color: #875600; }
    .badge.low { background: #eaf0e8; color: #4f5b52; }
    .stage-text, .action-text, .video-cell, .auth-cell { font-size: 13px; line-height: 1.35; overflow-wrap: anywhere; }
    .video-cell { font-weight: 700; color: var(--accent); }
    .detail h2 {
      margin: 0 0 10px;
      font-size: 20px;
      overflow-wrap: anywhere;
    }
    .detail-section {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      margin-top: 14px;
    }
    .detail-title {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }
    .message-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .message-head .detail-title {
      margin-bottom: 0;
    }
    .message-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .message {
      background: var(--paper);
      color: var(--ink);
      border-radius: 8px;
      padding: 14px;
      min-height: 150px;
      line-height: 1.55;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }
    .copy-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .contact-action-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      flex-wrap: wrap;
    }
    .contact-action-row .contact {
      margin-top: 0;
      flex: 0 1 auto;
    }
    .contact-inline-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .compact-action {
      padding: 5px 8px;
      font-size: 12px;
      line-height: 1.2;
      border-radius: 6px;
    }
    .editable-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .editable-field.full {
      grid-column: 1 / -1;
    }
    .hidden-action {
      display: none;
    }
    .side-action {
      width: 100%;
      margin: 4px 0 14px;
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 1120px) {
      .app { grid-template-columns: 240px minmax(0, 1fr); }
      .detail { grid-column: 1 / -1; height: auto; position: static; }
    }
    @media (max-width: 760px) {
      .app { display: block; padding: 12px; }
      .sidebar, .main, .detail { height: auto; position: static; margin-bottom: 12px; }
      .list-head { position: static; margin: -18px -18px 10px; }
      .creator, .creator-header { grid-template-columns: 1fr; }
      .creator-header { display: none; }
      .stat-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .stat b { font-size: 18px; }
    }
  </style>
</head>

  <script>
    const rows = JSON.parse(document.getElementById('dashboard-data').textContent);
    const state = { filter: 'all', selected: 0, page: 1, adding: false };
    const list = document.getElementById('list');
    const detail = document.getElementById('detail');
    const count = document.getElementById('count');
    const search = document.getElementById('search');
    const priority = document.getElementById('priority');
    const stage = document.getElementById('stage');
    const pageSize = document.getElementById('pageSize');
    const prevPage = document.getElementById('prevPage');
    const nextPage = document.getElementById('nextPage');
    const pageStatus = document.getElementById('pageStatus');
    const newCreator = document.getElementById('newCreator');

    const stageValues = [...new Set(rows.map(row => row.stage).filter(Boolean))].sort();
    const actionValues = [...new Set(rows.map(row => row.next_action).filter(Boolean))].sort();
    stageValues.forEach(value => {
      const option = document.createElement('option');
      option.value = value;
      option.textContent = value;
      stage.appendChild(option);
    });

    function priorityClass(value) {
      if (value === '高') return 'high';
      if (value === '中') return 'mid';
      return 'low';
    }

    function visibleRows() {
      const query = search.value.trim().toLowerCase();
      return rows.filter(row => {
        const blob = [row.date, row.username, row.whatsapp_contact, row.tk_profile_url, row.posted_video_count, row.authorization_raw, row.authorization_type, row.cooperation_status, row.whatsapp_status, row.stage, row.blocker, row.next_action, row.english_message].join(' ').toLowerCase();
        if (query && !blob.includes(query)) return false;
        if (priority.value && row.priority !== priority.value) return false;
        if (stage.value && row.stage !== stage.value) return false;
        if (state.filter === 'today' && row.priority !== '高') return false;
        if (state.filter === 'repeat' && !row.is_repeat_creator) return false;
        if (state.filter === 'sample' && !row.needs_sample) return false;
        if (state.filter === 'auth' && !row.stage.includes('ad code') && !row.next_action.includes('授权') && !row.authorization_raw) return false;
        if (state.filter === 'fathers' && !row.is_fathers_day) return false;
        if (state.filter === 'cooperated' && !isCooperated(row)) return false;
        if (state.filter === 'published' && Number(row.posted_video_count || 0) <= 0) return false;
        if (state.filter === 'replied' && !isReplied(row)) return false;
        return true;
      });
    }

    function includesAny(value, keywords) {
      const text = String(value || '');
      return keywords.some(keyword => text.includes(keyword));
    }

    function isCooperated(row) {
      return includesAny([row.cooperation_status, row.stage, row.next_action, row.blocker].join(' '), ['达成合作', '同意合作', '确认合作']);
    }

    function isReplied(row) {
      return Boolean(row.has_whatsapp) || includesAny([row.whatsapp_status, row.cooperation_status, row.stage, row.blocker].join(' '), ['已回复', '回复', '回过', '沟通中']);
    }

    function renderList() {
      const data = visibleRows();
      const size = Number(pageSize.value || 100);
      const totalPages = Math.max(1, Math.ceil(data.length / size));
      if (state.page > totalPages) state.page = totalPages;
      if (state.page < 1) state.page = 1;
      const start = (state.page - 1) * size;
      const pageRows = data.slice(start, start + size);
      count.textContent = `${data.length} 条`;
      pageStatus.textContent = `第 ${state.page} / ${totalPages} 页`;
      prevPage.disabled = state.page <= 1;
      nextPage.disabled = state.page >= totalPages;
      list.innerHTML = '';
      if (!pageRows.length) {
        list.innerHTML = '<div class="empty">当前筛选下没有需要跟进的达人</div>';
        if (!state.adding) detail.innerHTML = '<h2>未选择达人</h2><p class="meta">调整筛选条件后再查看。</p>';
        return;
      }
      if (state.selected >= pageRows.length) state.selected = 0;
      pageRows.forEach((row, index) => {
        const tkUrl = profileUrl(row);
        const card = document.createElement('article');
        card.className = `creator ${index === state.selected ? 'selected' : ''}`;
        card.innerHTML = `
          <div class="date-cell">${row.date ? escapeHtml(row.date) : '<span class="empty-contact">未填写</span>'}</div>
          <div>
            <div class="name">${escapeHtml(row.username)}</div>
            <div class="meta">${row.stalled_days || 0} 天未更新</div>
            <div class="badge-row">
              <span class="badge ${priorityClass(row.priority)}">${escapeHtml(row.priority)}</span>
              ${row.has_whatsapp ? '<span class="badge">WhatsApp</span>' : ''}
              ${row.is_repeat_creator ? '<span class="badge">老达人</span>' : ''}
              ${row.is_fathers_day ? '<span class="badge">父亲节</span>' : ''}
            </div>
          </div>
          <div class="contact-cell">${row.whatsapp_contact ? escapeHtml(row.whatsapp_contact) : '<span class="empty-contact">未填写</span>'}</div>
          <div>${tkUrl ? `<a class="profile-link" href="${escapeAttr(tkUrl)}" target="_blank" rel="noreferrer">打开主页</a>` : '<span class="empty-contact">未填写</span>'}</div>
          <div class="video-cell">${escapeHtml(row.posted_video_count || 0)}</div>
          <div class="auth-cell">${row.authorization_raw ? escapeHtml(row.authorization_raw) : '<span class="empty-contact">未填写</span>'}</div>
          <div class="stage-text">${escapeHtml(row.stage)}</div>
          <div class="action-text">${escapeHtml(row.next_action)}</div>
        `;
        card.addEventListener('click', () => {
          state.adding = false;
          state.selected = index;
          renderList();
          renderDetail(pageRows[index]);
        });
        list.appendChild(card);
      });
      if (!state.adding) renderDetail(pageRows[state.selected]);
    }

    function renderDetail(row) {
      const stageOptionsHtml = optionsHtml([...stageValues, row.stage], row.stage);
      const actionOptionsHtml = optionsHtml([...actionValues, row.next_action], row.next_action);
      const tkUrl = profileUrl(row);
      detail.innerHTML = `
        <h2>${escapeHtml(row.username)}</h2>
        <div class="badge-row">
          <span class="badge ${priorityClass(row.priority)}">${escapeHtml(row.priority)}</span>
          <span class="badge">${escapeHtml(row.stage)}</span>
          ${row.is_repeat_creator ? '<span class="badge">老达人复合作</span>' : ''}
          ${row.needs_sample ? '<span class="badge">需要寄样链路</span>' : ''}
        </div>
        <div class="detail-section">
          <div class="detail-title">WhatsApp 联系方式</div>
          <div class="contact-action-row">
            <div class="contact">${row.whatsapp_contact ? escapeHtml(row.whatsapp_contact) : '未填写'}</div>
            ${row.whatsapp_contact ? '<div class="contact-inline-actions"><button class="action-button compact-action" id="copyWhatsapp">复制 WhatsApp</button></div>' : ''}
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-title">TK主页链接</div>
          ${tkUrl ? '<div class="copy-row"><button class="action-button" id="copyTikTok">复制 TK链接</button><a class="action-button" target="_blank" rel="noreferrer" href="' + escapeAttr(tkUrl) + '">打开 TK主页</a></div>' : '<div>未填写</div>'}
        </div>
        <div class="detail-section">
          <div class="message-head">
            <div class="detail-title">编辑当前页面数据</div>
            <div class="message-actions">
              <button class="compact-action danger" id="deleteCurrent">删除记录</button>
              <button class="primary compact-action" id="applyEdit">应用到页面</button>
            </div>
          </div>
          <div class="editable-grid">
            <label class="editable-field">日期
              <input type="date" data-edit-field="date" value="${escapeAttr(row.date || '')}">
            </label>
            <label class="editable-field">达人
              <input data-edit-field="username" value="${escapeAttr(row.username || '')}">
            </label>
            <label class="editable-field">WhatsApp 联系方式
              <input data-edit-field="whatsapp_contact" value="${escapeAttr(row.whatsapp_contact || '')}">
            </label>
            <label class="editable-field">TK主页链接
              <input data-edit-field="tk_profile_url" value="${escapeAttr(displayTikTokHandle(row.tk_profile_url || row.username || ''))}" placeholder="达人用户名或 @用户名">
            </label>
            <label class="editable-field">发布视频数
              <input type="number" min="0" data-edit-field="posted_video_count" value="${escapeAttr(row.posted_video_count || 0)}">
            </label>
            <label class="editable-field">授权状态
              <input data-edit-field="authorization_raw" value="${escapeAttr(row.authorization_raw || '')}" placeholder="ad code 或 账号已授权">
            </label>
            <label class="editable-field full">当前阶段
              <select data-edit-field="stage">${stageOptionsHtml}</select>
            </label>
            <label class="editable-field full">下一动作
              <select data-edit-field="next_action">${actionOptionsHtml}</select>
            </label>
            <label class="editable-field full">卡点
              <textarea data-edit-field="blocker">${escapeHtml(row.blocker || '')}</textarea>
            </label>
          </div>
        </div>
        <div class="detail-section">
          <div class="message-head">
            <div class="detail-title">英文消息</div>
            <div class="message-actions">
              <button class="primary compact-action hidden-action" id="confirmMessageEdit">确认修改</button>
              <button class="primary compact-action" id="copyMessage">复制英文</button>
            </div>
          </div>
          <textarea class="message" id="messageEditor">${escapeHtml(row.english_message)}</textarea>
        </div>
      `;
      document.getElementById('copyMessage').addEventListener('click', async () => {
        await navigator.clipboard.writeText(row.english_message);
      });
      document.getElementById('messageEditor').addEventListener('input', () => messageChanged(row));
      document.getElementById('confirmMessageEdit').addEventListener('click', () => {
        row.english_message = document.getElementById('messageEditor').value.trim();
        document.getElementById('confirmMessageEdit').classList.add('hidden-action');
        renderList();
      });
      document.getElementById('applyEdit').addEventListener('click', () => applyEdit(row));
      document.getElementById('deleteCurrent').addEventListener('click', () => deleteCreator(row));
      const copyWhatsapp = document.getElementById('copyWhatsapp');
      if (copyWhatsapp) {
        copyWhatsapp.addEventListener('click', async () => {
          await navigator.clipboard.writeText(row.whatsapp_contact);
        });
      }
      const copyTikTok = document.getElementById('copyTikTok');
      if (copyTikTok) {
        copyTikTok.addEventListener('click', async () => {
          await navigator.clipboard.writeText(profileUrl(row));
        });
      }
    }

    function optionsHtml(values, selected) {
      return [...new Set(values.filter(Boolean))]
        .sort()
        .map(value => `<option value="${escapeAttr(value)}" ${value === selected ? 'selected' : ''}>${escapeHtml(value)}</option>`)
        .join('');
    }

    function renderNewCreatorForm() {
      state.adding = true;
      const today = new Date().toISOString().slice(0, 10);
      const row = {
        date: today,
        username: '',
        stage: stageValues[0] || '',
        priority: '高',
        blocker: '',
        next_action: actionValues[0] || '',
        is_repeat_creator: false,
        needs_sample: false,
        has_whatsapp: false,
        whatsapp_contact: '',
        tk_profile_url: '',
        posted_video_count: 0,
        authorization_raw: '',
        is_fathers_day: false,
        stalled_days: 0,
        english_message: '',
        authorization_type: '',
        fathers_day_status: '',
      };
      const stageOptionsHtml = optionsHtml([...stageValues, row.stage], row.stage);
      const actionOptionsHtml = optionsHtml([...actionValues, row.next_action], row.next_action);
      detail.innerHTML = `
        <h2>新增达人</h2>
        <p class="meta">先在网页里添加预览；后端表格写回下一步再接。</p>
        <div class="detail-section">
          <div class="message-head">
            <div class="detail-title">新达人信息</div>
            <div class="message-actions">
              <button class="primary compact-action" id="addCreator">添加到页面</button>
            </div>
          </div>
          <div class="editable-grid">
            <label class="editable-field">日期
              <input type="date" data-edit-field="date" value="${escapeAttr(row.date)}">
            </label>
            <label class="editable-field">达人
              <input data-edit-field="username" placeholder="TikTok 用户名">
            </label>
            <label class="editable-field">WhatsApp 联系方式
              <input data-edit-field="whatsapp_contact" placeholder="号码">
            </label>
            <label class="editable-field">TK主页链接
              <input data-edit-field="tk_profile_url" placeholder="达人用户名或 @用户名">
            </label>
            <label class="editable-field">发布视频数
              <input type="number" min="0" data-edit-field="posted_video_count" value="0">
            </label>
            <label class="editable-field">授权状态
              <input data-edit-field="authorization_raw" placeholder="ad code 或 账号已授权">
            </label>
            <label class="editable-field full">当前阶段
              <select data-edit-field="stage">${stageOptionsHtml}</select>
            </label>
            <label class="editable-field full">下一动作
              <select data-edit-field="next_action">${actionOptionsHtml}</select>
            </label>
            <label class="editable-field full">卡点
              <textarea data-edit-field="blocker" placeholder="例如：已加WhatsApp但未进入合作确认"></textarea>
            </label>
          </div>
        </div>
        <div class="detail-section">
          <div class="message-head">
            <div class="detail-title">英文消息</div>
          </div>
          <textarea class="message" id="messageEditor" placeholder="可选：给这个达人准备的英文消息"></textarea>
        </div>
      `;
      document.getElementById('addCreator').addEventListener('click', () => addCreator(row));
    }

    function applyEdit(row) {
      detail.querySelectorAll('[data-edit-field]').forEach(control => {
        row[control.dataset.editField] = control.value.trim();
      });
      row.tk_profile_url = normalizeTikTokProfile(row.tk_profile_url || row.username);
      row.has_whatsapp = Boolean(row.whatsapp_contact);
      renderList();
    }

    function addCreator(row) {
      detail.querySelectorAll('[data-edit-field]').forEach(control => {
        row[control.dataset.editField] = control.value.trim();
      });
      row.english_message = document.getElementById('messageEditor').value.trim();
      row.username = row.username || '未命名达人';
      row.tk_profile_url = normalizeTikTokProfile(row.tk_profile_url || row.username);
      row.has_whatsapp = Boolean(row.whatsapp_contact);
      if (!stageValues.includes(row.stage) && row.stage) stageValues.push(row.stage);
      if (!actionValues.includes(row.next_action) && row.next_action) actionValues.push(row.next_action);
      rows.unshift(row);
      state.adding = false;
      state.filter = 'all';
      state.page = 1;
      state.selected = 0;
      document.querySelectorAll('#tabs button').forEach(button => button.classList.toggle('active', button.dataset.filter === 'all'));
      renderList();
    }

    function deleteCreator(row) {
      if (!window.confirm('确认删除这个达人吗？当前只会从页面里删除，不会修改后台表格。')) return;
      const index = rows.indexOf(row);
      if (index >= 0) rows.splice(index, 1);
      state.adding = false;
      state.selected = Math.max(0, state.selected - (state.selected > 0 ? 1 : 0));
      renderList();
    }

    function messageChanged(row) {
      const changed = document.getElementById('messageEditor').value.trim() !== String(row.english_message || '').trim();
      document.getElementById('confirmMessageEdit').classList.toggle('hidden-action', !changed);
    }

    function normalizeTikTokProfile(value) {
      const text = String(value || '').trim();
      if (!text) return '';
      if (new RegExp('^https?://', 'i').test(text)) return text;
      const handle = text.replace(/^@+/, '').replace(new RegExp('^https?://(www\\.)?tiktok\\.com/@?', 'i'), '').split(/[/?#]/)[0];
      return handle ? `https://www.tiktok.com/@${handle}` : '';
    }

    function profileUrl(row) {
      return normalizeTikTokProfile(row.tk_profile_url || row.username);
    }

    function displayTikTokHandle(value) {
      const text = String(value || '').trim();
      if (!text) return '';
      const match = text.match(new RegExp('tiktok\\.com/@([^/?#]+)', 'i'));
      if (match) return match[1];
      return text.replace(/^@+/, '');
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#96;');
    }

    document.getElementById('tabs').addEventListener('click', event => {
      if (!event.target.matches('button')) return;
      document.querySelectorAll('#tabs button').forEach(button => button.classList.remove('active'));
      event.target.classList.add('active');
      state.filter = event.target.dataset.filter;
      state.selected = 0;
      state.page = 1;
      state.adding = false;
      renderList();
    });
    newCreator.addEventListener('click', () => renderNewCreatorForm());
    [search, priority, stage].forEach(control => control.addEventListener('input', () => {
      state.selected = 0;
      state.page = 1;
      state.adding = false;
      renderList();
    }));
    pageSize.addEventListener('input', () => {
      state.selected = 0;
      state.page = 1;
      renderList();
    });
    prevPage.addEventListener('click', () => {
      state.selected = 0;
      state.page -= 1;
      renderList();
    });
    nextPage.addEventListener('click', () => {
      state.selected = 0;
      state.page += 1;
      renderList();
    });
    renderList();
  </script>
</body>
</html>
